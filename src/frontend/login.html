<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOTIPO - LOGIN: Taller de Automóviles y Repuestos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!--
    Formulario de inicio de sesión.
    Entrada: username y contraseña.
    Proceso: Verificar existencia en la base de datos.
    Salida:  Redirección con mensaje de éxito o error.
    -->

    <form action="/login" method="POST">
        <label for="username">Usuario:</label>
        <input type="text" id="username" name="username" required>
        <br>
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>
        <br>
        <button type="submit">Iniciar Sesión</button>
        <button type="button" onclick="window.location.href='register.html'">Registrarse</button>
        <button type="button" onclick="window.location.href='forgot-password.html'">Olvidé mi Contraseña</button>
    </form>
</body>

<!-- Script para manejar el inicio de sesión. -->
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    const user = users.find(u => u.username === username && u.password === password);
    if (user) {
        sessionStorage.setItem('user', username);
        alert('Login exitoso!');
        window.location.href = 'main.html';
    } else {
        alert('Usuario o contraseña incorrectos.');
    }
});
</script>

</html>
