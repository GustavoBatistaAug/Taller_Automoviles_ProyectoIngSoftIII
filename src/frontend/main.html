<html>
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PROTOTIPO - Taller de Automóviles y Repuestos</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/x-icon" href="icon.png">
    </head>
    <body>
        <!-- 1. Si el usuario no está registrado, redireccionar directamente a login.-->
        <script>
            // Uso de sessionStorage para verificar si el usuario actual está registrado.
            if (!sessionStorage.getItem("user")) {
                window.location.href = "login.html";
            }
        </script>
        <!-- 2. Contenido principal de la página -->
        <h1>Bienvenido al Taller de Automóviles y Repuestos</h1>
        <p>Contenido exclusivo para usuarios registrados.</p>
        <br>
        <p>Debug:
            <script>
                document.write("<br>");
                sessionStorage.getItem("user") ?
                    document.write("Usuario actual: " + sessionStorage.getItem("user")) :
                    document.write("No hay usuario registrado.");
            </script>
        </p>
        <button onclick="logout()">Cerrar Sesión</button>
    </body>

    <script>
        // Función para cerrar sesión.
        function logout() {
            sessionStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>
</html>
