<!-- Formulario de registro. -->
<link rel="stylesheet" href="styles.css">

<form action="/register" method="POST">
    <label for="username">Usuario:</label>
    <input type="text" id="username" name="username" required>
    <br>
    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password" required>
    <br>
    <label for="confirm-password">Confirmar Contraseña:</label>
    <input type="password" id="confirm-password" name="confirm-password" required>
    <br>
    <label for="rol">Rol:</label>
    <select id="rol" name="rol" required>
        <option value="cliente">Cliente</option>
        <option value="mecanico">Mecánico</option> <!-- Para propósito de debug, no se verifica usuario por ahora -->
    </select>
    <br>
    <button type="submit">Registrarse</button>
    <br>
    <button type="button" onclick="window.location.href='login.html'">Iniciar Sesión</button>
    <br>
</form>

<!-- Script para manejar el registro de usuarios. -->
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    users.push({ username, password });
    localStorage.setItem('users', JSON.stringify(users));
    alert('Usuario registrado!');
    window.location.href = 'login.html';
});
</script>
